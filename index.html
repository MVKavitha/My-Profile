<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M V Kavitha — Salesforce Expert</title>
<style>
  :root {
    --bg: #0F172A;
    --card: #1E293B;
    --text: #F8FAFC;
    --accent: #8B5CF6; /* Vibrant Violet */
    --accent-secondary: #F43F5E; /* Electric Coral */
    --glow: rgba(139, 92, 246, 0.3);
  }

  body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px;
  }

  /* Orbit Animation */
  .orbit {
    position: fixed; top: 10%; right: 10%; width: 300px; height: 300px;
    border: 1px solid var(--glow); border-radius: 50%;
    animation: rotate 20s linear infinite; z-index: -1;
  }
  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Floating Animation */
  .float { animation: floating 3s ease-in-out infinite; }
  @keyframes floating { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

  /* Skill Bar Animation */
  .bar-container { background: #334155; width: 100%; height: 10px; border-radius: 5px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); width: 0; animation: fill 2s forwards; }
  @keyframes fill { to { width: 90%; } }

  .card { 
    background: var(--card); padding: 20px; border-radius: 16px; 
    transition: transform 0.3s; border: 1px solid #334155;
  }
  .card:hover { transform: scale(1.02); border-color: var(--accent); }
  
  a { text-decoration: none; color: inherit; display: block; }
  .btn { padding: 10px 20px; background: var(--accent); border-radius: 8px; color: white; display: inline-block; margin-top: 10px; }
</style>
</head>
<body>

<div class="orbit"></div>

<div style="max-width: 800px; margin: auto;">
  <h1 class="float">M V Kavitha</h1>
  
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
    <!-- Fixed Trailblazer Link -->
    <a href="https://www.salesforce.com/trailblazer/kavitharajatammana" target="_blank">
      <div class="card">
        <h3>Trailblazer Profile</h3>
        <p>Click to view my official Salesforce certifications and badges.</p>
        <span class="btn">Visit Profile</span>
      </div>
    </a>

    <div class="card">
      <h3>Contact Me</h3>
      <p>Call: <a href="tel:+919538916181">9538916181</a></p>
      <p>Mail: <a href="mailto:kavitha.rajatammana@yahoo.com">kavitha.rajatammana@yahoo.com</a></p>
    </div>
  </div>

  <div class="card" style="margin-top: 20px;">
    <h3>Skills Automation</h3>
    <p>Salesforce Expertise</p>
    <div class="bar-container"><div class="bar-fill"></div></div>
  </div>
</div>

</body>
</html>
